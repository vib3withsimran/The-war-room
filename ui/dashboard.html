<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAR ROOM | COMMAND CENTER v2.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/tokens.css">
    <link rel="stylesheet" href="assets/components.css">
    
    <style>
        :root {
            --sidebar-width: 380px;
            --sl-accent: #00F0FF; /* Cyber Cyan */
            --sl-danger: #FF003C; /* High-viz Red */
            --sl-warning: #FFD200; /* Caution Yellow */
            --glass: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(237, 237, 232, 0.1);
        }

        /* --- Global Aesthetics --- */
        body.sl-body {
            background: #0A0A0A;
            color: #E0E0E0;
            overflow: hidden;
            height: 100vh;
        }

        .sl-grain::before { opacity: 0.08; }

        /* Dynamic Grid Background */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent);
        }

        .scanning-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, var(--sl-accent), transparent);
            opacity: 0.1;
            z-index: 1000;
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            from { transform: translateY(-100vh); }
            to { transform: translateY(100vh); }
        }

        /* --- Layout --- */
        .app-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
            border: 1px solid var(--glass-border);
            margin: 10px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        /* --- Sidebar --- */
        .sidebar {
            background: rgba(15, 15, 15, 0.9);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            border: 2px solid var(--sl-accent);
            display: grid;
            place-items: center;
            font-family: var(--sl-ff-display);
            font-size: 20px;
            color: var(--sl-accent);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .brand-text {
            font-family: var(--sl-ff-display);
            font-size: 22px;
            letter-spacing: 2px;
            line-height: 1;
        }

        .status-chip {
            font-size: 10px;
            font-family: var(--sl-ff-mono);
            background: rgba(0, 240, 255, 0.1);
            color: var(--sl-accent);
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .nav-section { margin-bottom: 40px; }
        .section-header {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-header::after { content: ""; flex-grow: 1; height: 1px; background: #333; }

        .alert-card {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid transparent;
            margin-bottom: 12px;
            transition: all 0.3s var(--sl-ease);
            cursor: pointer;
        }

        .alert-card:hover { background: rgba(255, 255, 255, 0.07); border-color: rgba(255,255,255,0.1); }
        .alert-card.active { border-color: var(--sl-accent); background: rgba(0, 240, 255, 0.05); }

        .sev-indicator {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        /* --- Main View --- */
        .main-view {
            padding: 50px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            overflow-y: auto;
        }

        .incident-hero {
            position: relative;
        }

        .incident-hero h1 {
            font-family: var(--sl-ff-display);
            font-size: 80px;
            line-height: 0.85;
            text-transform: uppercase;
            margin: 0;
            color: white;
            letter-spacing: -4px;
        }

        /* The Ultimate Overlap Verdict */
        .verdict-floating {
            position: absolute;
            top: 60%;
            right: 50px;
            width: 500px;
            background: white;
            color: black;
            padding: 40px;
            border-radius: 2px; /* Brutalist sharp */
            box-shadow: 20px 20px 0px var(--sl-accent);
            z-index: 100;
            transform: skew(-2deg);
        }

        .verdict-floating h2 {
            font-family: var(--sl-ff-display);
            font-size: 32px;
            margin: 0 0 20px 0;
            line-height: 1;
            text-transform: uppercase;
        }

        .action-button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: black;
            color: white;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .action-button:hover { transform: translateX(10px); background: #222; }

        /* --- Agent diagnostic grid --- */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .agent-hud {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            position: relative;
            transition: all 0.4s;
        }

        .agent-hud:hover { border-color: var(--sl-accent); background: rgba(0, 240, 255, 0.02); }

        .hud-corner {
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid var(--sl-accent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .agent-hud:hover .hud-corner { opacity: 1; }
        .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .agent-id-badge {
            font-family: var(--sl-ff-mono);
            font-size: 10px;
            color: var(--sl-accent);
            background: rgba(0, 240, 255, 0.1);
            padding: 2px 6px;
        }

        .agent-viz {
            height: 60px;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }

        .viz-bar {
            flex-grow: 1;
            background: var(--sl-accent);
            opacity: 0.3;
            transition: height 0.3s;
        }

        .agent-data {
            font-family: var(--sl-ff-mono);
            font-size: 11px;
            color: #888;
        }

        /* --- Console --- */
        .console-wrap {
            background: #000;
            border: 1px solid #222;
            padding: 15px;
            font-family: var(--sl-ff-mono);
            font-size: 12px;
            height: 200px;
            overflow-y: auto;
            position: relative;
        }

        .console-line { margin-bottom: 4px; display: flex; gap: 10px; }
        .line-ts { color: #444; }
        .line-tag { color: var(--sl-accent); font-weight: bold; }
        .line-msg { color: #ccc; }

        /* Animations */
        .reveal { animation: reveal 1s var(--sl-ease) forwards; opacity: 0; }
        @keyframes reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }

        .glitch-text {
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            2% { transform: skew(10deg); filter: blur(1px); }
            4% { transform: skew(0deg); filter: blur(0); }
            100% { transform: skew(0deg); }
        }
    </style>
</head>
<body class="sl-body sl-grain">
    <div class="grid-overlay"></div>
    <div class="scanning-line"></div>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand-zone">
                <div class="logo-box">W</div>
                <div>
                    <div class="brand-text">WAR ROOM</div>
                    <div class="status-chip">FOUNDRY OS v4.2</div>
                </div>
            </div>

            <div class="nav-section">
                <div class="section-header">Live Alerts</div>
                <div class="alert-card active">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span style="font-size: 10px; color: var(--sl-danger); font-weight: bold;">CRITICAL</span>
                        <span style="font-family: var(--sl-ff-mono); font-size: 10px; color: #555;">0.2s ago</span>
                    </div>
                    <div style="font-weight: bold; font-size: 14px;">API GATEWAY SPIKE</div>
                    <div style="font-size: 11px; color: #666; margin-top: 5px;">Latency across all clusters</div>
                </div>

                <div class="alert-card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span style="font-size: 10px; color: var(--sl-warning); font-weight: bold;">WARNING</span>
                        <span style="font-family: var(--sl-ff-mono); font-size: 10px; color: #555;">12m ago</span>
                    </div>
                    <div style="font-weight: bold; font-size: 14px;">DB POOL EXHAUSTION</div>
                </div>
            </div>

            <div style="margin-top: auto;">
                <button id="run-sim" class="btn" style="width: 100%; height: 50px; background: var(--sl-accent); color: black; font-weight: 800; border: none; border-radius: 4px; cursor: pointer;">
                    EXECUTE COMMANDER
                </button>
            </div>
        </aside>

        <!-- MAIN VIEW -->
        <main class="main-view">
            <div id="boot-screen" style="text-align: center; margin-top: 100px;">
                <h1 style="font-family: var(--sl-ff-display); font-size: 120px; color: #111; line-height: 1;">OFFLINE</h1>
                <p style="font-family: var(--sl-ff-mono); color: #333;">SYSTEMS READY. AWAITING TRIGGER.</p>
            </div>

            <div id="incident-view" class="hidden">
                <div class="incident-hero">
                    <h1 id="main-title" class="glitch-text">API GATEWAY<br>FAILURE</h1>
                    
                    <div id="verdict-box" class="verdict-floating hidden">
                        <div class="verdict-title">STRATEGIC RESOLUTION</div>
                        <h2 id="verdict-msg">...</h2>
                        <div id="action-list">
                            <!-- Actions -->
                        </div>
                    </div>
                </div>

                <div class="section-header">Agent Triage Cluster</div>
                <div class="agent-grid" id="agent-grid">
                    <!-- Agents -->
                </div>

                <div class="section-header">Band SDK Foundry Logs</div>
                <div class="console-wrap" id="console">
                    <!-- Logs -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const agents = [
            { id: 'MTX', name: 'METRICS', role: 'TELEMETRY', sig: 'ANOMALY', color: '#00F0FF' },
            { id: 'LOG', name: 'LOGS', role: 'EXCEPTIONS', sig: 'CLEAR', color: '#00F0FF' },
            { id: 'CHG', name: 'CHANGE', role: 'DEPLOYMENTS', sig: 'STABLE', color: '#00F0FF' },
            { id: 'RBK', name: 'RUNBOOK', role: 'REMEDIATION', sig: 'MATCH', color: '#00F0FF' }
        ];

        const logs = [
            { ts: '21:44:01', tag: 'CORE', msg: 'INGESTING #incident-events: alert-001' },
            { ts: '21:44:02', tag: 'CMD', msg: 'GENERATING INCIDENT CONTEXT: inc-7e1e2509' },
            { ts: '21:44:03', tag: 'BAND', msg: 'BROADCASTING #triage-tasks TO 4 SUBSCRIBERS' },
            { ts: '21:44:04', tag: 'MTX', msg: 'ANALYSING LATENCY DATA... SPIKE CONFIRMED' },
            { ts: '21:44:05', tag: 'LOG', msg: 'AUDITING 15K LOGS... NO EXCEPTIONS FOUND' },
            { ts: '21:44:06', tag: 'CHG', msg: 'CHECKING DEPLOY HISTORY... BASELINE MATCH' },
            { ts: '21:44:07', tag: 'RBK', msg: 'MATCHING PLAYBOOK: LATENCY-L3-RECOVERY' },
            { ts: '21:44:08', tag: 'CMD', msg: 'SYNTHESIZING FINAL VERDICT...' },
            { ts: '21:44:09', tag: 'CORE', msg: 'PUBLISHING #commander-verdict' }
        ];

        function simulate() {
            document.getElementById('boot-screen').classList.add('hidden');
            document.getElementById('incident-view').classList.remove('hidden');
            document.getElementById('agent-grid').innerHTML = '';
            document.getElementById('console').innerHTML = '';
            document.getElementById('verdict-box').classList.add('hidden');

            // 1. Logs Simulation
            logs.forEach((line, i) => {
                setTimeout(() => {
                    const l = document.createElement('div');
                    l.className = 'console-line reveal';
                    l.innerHTML = `
                        <span class="line-ts">${line.ts}</span>
                        <span class="line-tag">[${line.tag}]</span>
                        <span class="line-msg">${line.msg}</span>
                    `;
                    document.getElementById('console').appendChild(l);
                    document.getElementById('console').scrollTop = 9999;
                }, i * 800);
            });

            // 2. Agents Simulation
            agents.forEach((a, i) => {
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = 'agent-hud reveal';
                    card.innerHTML = `
                        <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
                        <div class="hud-corner bl"></div><div class="hud-corner br"></div>
                        <div class="agent-header">
                            <div>
                                <div style="font-size: 9px; color: #555;">AGENT // ${a.role}</div>
                                <div style="font-weight: 800; font-size: 16px;">${a.name}</div>
                            </div>
                            <div class="agent-id-badge">${a.id}-0${i+1}</div>
                        </div>
                        <div class="agent-viz" id="viz-${a.id}"></div>
                        <div class="agent-data">
                            <div>STATUS: <span style="color: ${a.color}">${a.sig}</span></div>
                            <div>CONFIDENCE: <span id="conf-${a.id}">0</span>%</div>
                        </div>
                    `;
                    document.getElementById('agent-grid').appendChild(card);
                    
                    // Create viz bars
                    const viz = card.querySelector('.agent-viz');
                    for(let k=0; k<12; k++) {
                        const bar = document.createElement('div');
                        bar.className = 'viz-bar';
                        bar.style.height = '10%';
                        viz.appendChild(bar);
                    }

                    // Animate bars & conf
                    let conf = 0;
                    const interval = setInterval(() => {
                        conf += 5;
                        document.getElementById(`conf-${a.id}`).innerText = conf;
                        viz.querySelectorAll('.viz-bar').forEach(b => {
                            b.style.height = Math.random() * 100 + '%';
                        });
                        if(conf >= 90) clearInterval(interval);
                    }, 50);

                    if (i === agents.length - 1) setTimeout(showVerdict, 2000);
                }, 1000 + (i * 1200));
            });
        }

        function showVerdict() {
            const v = document.getElementById('verdict-box');
            v.classList.remove('hidden');
            v.classList.add('reveal');
            document.getElementById('verdict-msg').innerText = "SYSTEM OVERLOAD. SCALE INFRASTRUCTURE IMMEDIATELY.";
            
            const actions = ["SCALE NODES x4", "ENABLE CACHE L2", "ALERT SRE TEAM"];
            const list = document.getElementById('action-list');
            list.innerHTML = '';
            actions.forEach(act => {
                const btn = document.createElement('button');
                btn.className = 'action-button';
                btn.innerHTML = `<span>▶</span> ${act}`;
                list.appendChild(btn);
            });
        }

        document.getElementById('run-sim').addEventListener('click', simulate);
    </script>
</body>
</html>
