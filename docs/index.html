<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The War Room — Incident Response Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070A13;
            color: #F4F6FC;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
        .accent { color: #00B4D8; }
        p { color: #8E9AAF; font-size: 1.1rem; max-width: 500px; line-height: 1.6; margin-bottom: 2rem; }
        .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        a {
            background: rgba(27, 38, 59, 0.45);
            border: 1px solid rgba(255,255,255,0.06);
            color: #F4F6FC;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        a:hover { background: #00B4D8; color: #070A13; border-color: #00B4D8; }
        .badge {
            display: inline-block;
            background: rgba(0, 180, 216, 0.15);
            color: #00B4D8;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

</head>
<body>
    <div class="badge">Hackathon Project</div>
    <h1>The <span class="accent">War Room</span></h1>
    <p>Multi-agent incident response platform. AI agents triage, deliberate, and resolve incidents in real-time.</p>
